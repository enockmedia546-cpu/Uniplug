<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIPLUG | Entrepreneur Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --blue:#2563eb; --sky:#0ea5e9; --amber:#f59e0b;
  --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08); --text:#ffffff;
  --muted:#9ca3af; --label:#d1d5db;
  --error:#ef4444; --success:#10b981;
  --sidebar:255px; --radius:14px;
}
body {
  background: radial-gradient(circle at 80% 10%,rgba(245,158,11,0.1),transparent 40%),
              radial-gradient(circle at 10% 90%,rgba(37,99,235,0.08),transparent 40%),
              linear-gradient(135deg,#000,#05070d,#0b1120);
  color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden;
}
.sidebar { position:fixed; top:0; left:0; width:var(--sidebar); height:100vh; background:rgba(5,7,13,0.97); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; transition:transform 0.3s; }
.s-logo { padding:22px 20px; border-bottom:1px solid var(--border); font-family:'Syne',sans-serif; font-size:20px; font-weight:800; letter-spacing:2px; }
.s-logo span { color:var(--sky); }
.s-profile { padding:14px 20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.2s; }
.s-profile:hover { background:var(--surface); }
.s-av { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--amber),#f97316); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; overflow:hidden; border:2px solid rgba(245,158,11,0.3); }
.s-av img { width:100%; height:100%; object-fit:cover; }
.s-name { font-size:13px; font-weight:600; }
.s-role { font-size:11px; color:#fbbf24; margin-top:1px; }
.s-nav { flex:1; overflow-y:auto; padding:8px 0; }
.s-sec { font-size:10px; font-weight:600; letter-spacing:1.2px; color:var(--muted); text-transform:uppercase; padding:12px 20px 5px; }
.s-item { display:flex; align-items:center; gap:10px; padding:11px 20px; cursor:pointer; font-size:13px; color:var(--muted); border-left:3px solid transparent; transition:all 0.2s; }
.s-item:hover { background:var(--surface); color:var(--text); }
.s-item.active { background:rgba(245,158,11,0.08); color:var(--text); border-left-color:var(--amber); }
.s-icon { width:18px; text-align:center; font-size:14px; }
.s-tag { margin-left:auto; font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; background:rgba(245,158,11,0.15); color:#fbbf24; text-transform:uppercase; letter-spacing:0.5px; }
.s-bottom { padding:14px 16px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
.s-btn { width:100%; padding:9px 12px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all 0.2s; text-align:left; display:flex; align-items:center; gap:8px; }
.s-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }
.s-btn.danger:hover { color:var(--error); border-color:var(--error); }
.main { margin-left:var(--sidebar); min-height:100vh; }
.topbar { position:sticky; top:0; background:rgba(5,7,13,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; padding:0 28px; gap:16px; z-index:50; }
.tb-hamburger { display:none; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; }
.tb-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; flex:1; }
.tb-av { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--amber),#f97316); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; overflow:hidden; cursor:pointer; }
.tb-av img { width:100%; height:100%; object-fit:cover; }
.content { padding:28px; }
.page-hdr { margin-bottom:22px; }
.page-hdr h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
.page-hdr p  { color:var(--muted); font-size:13px; margin-top:4px; }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(148px,1fr)); gap:14px; margin-bottom:22px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; transition:all 0.2s; }
.stat:hover { border-color:rgba(245,158,11,0.3); transform:translateY(-2px); }
.stat-icon { font-size:20px; margin-bottom:8px; }
.stat-val  { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
.stat-lbl  { font-size:11px; color:var(--muted); margin-top:2px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:18px; }
.card-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.card-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
.form-col { display:flex; flex-direction:column; gap:14px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.f-wrap { display:flex; flex-direction:column; gap:6px; }
label { font-size:13px; color:var(--label); font-weight:500; }
input,select,textarea { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; transition:border 0.2s,box-shadow 0.2s; -webkit-appearance:none; }
input:focus,select:focus,textarea:focus { outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,158,11,0.1); }
input::placeholder,textarea::placeholder { color:rgba(255,255,255,0.2); }
select option { background:#0d1b35; }
textarea { resize:vertical; min-height:90px; }
.btn { padding:9px 16px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; border:none; }
.btn-primary { background:linear-gradient(135deg,var(--amber),#f97316); color:#000; box-shadow:0 4px 14px rgba(245,158,11,0.25); }
.btn-primary:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 18px rgba(245,158,11,0.35); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-outline:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
.btn-danger { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:var(--error); }
.btn-danger:hover { background:rgba(239,68,68,0.18); }
.btn-sm { padding:6px 11px; font-size:11px; border-radius:7px; }
.badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; }
.b-amber { background:rgba(245,158,11,0.12); color:#fbbf24; }
.b-green  { background:rgba(16,185,129,0.12); color:#34d399; }
.b-red    { background:rgba(239,68,68,0.12);  color:#f87171; }
.b-blue   { background:rgba(37,99,235,0.12);  color:#60a5fa; }
.b-gray   { background:rgba(156,163,175,0.12);color:#9ca3af; }
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { padding:9px 14px; text-align:left; font-size:10px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; background:rgba(0,0,0,0.15); }
tbody td { padding:13px 14px; border-bottom:1px solid rgba(255,255,255,0.03); vertical-align:middle; }
tbody tr:hover { background:rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom:none; }
.td-acts { display:flex; gap:6px; }
.photo-zone { border:2px dashed var(--border); border-radius:12px; padding:22px; text-align:center; cursor:pointer; transition:all 0.2s; }
.photo-zone:hover { border-color:rgba(245,158,11,0.5); background:rgba(245,158,11,0.04); }
.photo-previews { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.photo-thumb-wrap { position:relative; width:76px; height:76px; }
.photo-thumb { width:76px; height:76px; border-radius:8px; object-fit:cover; border:1px solid var(--border); }
.photo-remove { position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; background:var(--error); border:none; color:white; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty .ei { font-size:3rem; margin-bottom:10px; }
.empty h3 { font-size:15px; color:var(--label); margin-bottom:6px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin 0.7s linear infinite; margin:36px auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.s-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:99; }
.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(16px); padding:11px 22px; border-radius:50px; font-size:13px; font-weight:500; z-index:9999; opacity:0; pointer-events:none; transition:all 0.28s; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error   { background:#dc2626; color:white; }
.toast.success { background:var(--success); color:white; }
.toast.info    { background:#1d4ed8; color:white; }
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); } .sidebar.open { transform:translateX(0); }
  .s-overlay.show { display:block; } .main { margin-left:0; } .tb-hamburger { display:block; }
  .content { padding:16px; } .form-row { grid-template-columns:1fr; } .stats-row { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="s-overlay" id="sOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="s-logo">UNI<span>PLUG</span></div>
  <div class="s-profile" onclick="go('profile')">
    <div class="s-av" id="sAv"><i class="fas fa-store"></i></div>
    <div><div class="s-name" id="sName">Loading...</div><div class="s-role">Entrepreneur</div></div>
  </div>
  <nav class="s-nav">
    <div class="s-sec"><i class="fas fa-th-large"></i> Main</div>
    <div class="s-item active" id="n-home" onclick="go('home')">    <span class="s-icon"><i class="fas fa-home"></i></span> Home</div>
    <div class="s-item"        id="n-shop"     onclick="go('shop')">    <span class="s-icon"><i class="fas fa-store"></i></span> Campus Shop</div>
    <div class="s-item"        id="n-updates"  onclick="go('updates')"> <span class="s-icon"><i class="fas fa-newspaper"></i></span> Updates</div>
    <div class="s-item"        id="n-boarding" onclick="go('boarding')"><span class="s-icon"><i class="fas fa-building"></i></span> Boarding Houses</div>
    <div class="s-item"        id="n-chat"     onclick="go('chat')">    <span class="s-icon"><i class="fas fa-comments"></i></span> Class Chat</div>
    <div class="s-item"        id="n-profile"  onclick="go('profile')"> <span class="s-icon"><i class="fas fa-user-circle"></i></span> My Profile</div>
    <div class="s-sec"><i class="fas fa-store"></i> My Shop</div>
    <div class="s-item" id="n-products" onclick="go('products')"><span class="s-icon"><i class="fas fa-box"></i></span> My Products  <span class="s-tag">SHOP</span></div>
    <div class="s-item" id="n-add"      onclick="go('add')">     <span class="s-icon"><i class="fas fa-plus-circle"></i></span> Add Product  <span class="s-tag">SHOP</span></div>
  </nav>
  <div class="s-bottom">
    <button class="s-btn" onclick="window.location.href='boarding.html'"><i class="fas fa-globe"></i> View Site</button>
    <button class="s-btn danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="tb-hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="tb-title" id="tbTitle">Home</div>
    <div style="flex:1;"></div>
    <div class="tb-av" id="tbAv" onclick="go('profile')"><i class="fas fa-store"></i></div>
  </div>
  <div class="content" id="mainContent"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, addDoc, updateDoc, deleteDoc,
  collection, query, where, orderBy, onSnapshot, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyAxwUZXw4YuOh6X29G9utuld-JtOTEhf0g",
  authDomain: "unplugin-f9afc.firebaseapp.com",
  projectId: "unplugin-f9afc",
  storageBucket: "unplugin-f9afc.appspot.com"
});

const auth=getAuth(app); const db=getFirestore(app); const storage=getStorage(app);
let currentUser=null; let userData=null; let chatUnsub=null;
let pendingPhotos=[]; let existingPhotos=[]; let editingId=null;

// NO RESTRICTIONS - Anyone can access
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
      userData = snap.data();
    } else {
      // Create default user data for testing
      userData = { 
        fullName: "Entrepreneur", 
        role: "Entrepreneur", 
        email: user.email,
        bizName: "My Shop",
        bizLocation: "On Campus"
      };
    }
  } else {
    // Guest mode for testing
    currentUser = { uid: "guest_" + Date.now() };
    userData = { 
      fullName: "Guest Entrepreneur", 
      role: "Entrepreneur", 
      bizName: "Guest Shop",
      bizLocation: "Campus"
    };
  }
  init();
});

function init() {
  const ini = (userData.fullName || "E").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("sName").textContent = userData.bizName || userData.fullName || "Entrepreneur";
  if (userData.photoURL) {
    document.getElementById("sAv").innerHTML = `<img src="${userData.photoURL}">`;
    document.getElementById("tbAv").innerHTML = `<img src="${userData.photoURL}">`;
  } else { 
    document.getElementById("sAv").innerHTML = '<i class="fas fa-store"></i>';
    document.getElementById("tbAv").innerHTML = '<i class="fas fa-store"></i>';
  }
  go("home");
}

const TITLES = {
  home: "Home", shop: "Campus Shop", updates: "Updates", 
  boarding: "Boarding Houses", chat: "Class Chat", profile: "My Profile", 
  products: "My Products", add: "Add Product"
};

window.go = function(s) {
  if (chatUnsub) { chatUnsub(); chatUnsub=null; }
  document.querySelectorAll(".s-item").forEach(e=>e.classList.remove("active"));
  const n = document.getElementById("n-"+s); if(n) n.classList.add("active");
  document.getElementById("tbTitle").textContent = TITLES[s] || s;
  closeSidebar();
  const renders = {
    home: renderHome, shop: renderShop, updates: renderUpdates, 
    boarding: renderBoarding, chat: renderChat, profile: renderProfile, 
    products: renderProducts, add: () => renderAddEdit(null)
  };
  (renders[s] || renderHome)();
};

// ── HOME ──
async function renderHome() {
  set(`<div class="spinner"></div>`);
  let myProds = [];
  if (currentUser && !currentUser.uid.startsWith("guest")) {
    const q = await getDocs(query(collection(db,"products"), where("sellerId","==",currentUser.uid)));
    myProds = q.docs;
  }
  const inStock = myProds.filter(d=>d.data().available).length;
  const h = new Date().getHours(); 
  const greet = h<12?"Good morning":h<17?"Good afternoon":"Good evening";
  
  set(`
    <div class="page-hdr">
      <h1>${greet}, ${userData.firstName || userData.fullName?.split(" ")[0] || "Entrepreneur"} <i class="fas fa-store"></i></h1>
      <p>${userData.bizName || "Your Shop"} · ${userData.bizLocation || "On Campus"}</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-val">${myProds.length}</div><div class="stat-lbl">Total Products</div></div>
      <div class="stat"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-val">${inStock}</div><div class="stat-lbl">In Stock</div></div>
      <div class="stat"><div class="stat-icon"><i class="fas fa-times-circle"></i></div><div class="stat-val">${myProds.length-inStock}</div><div class="stat-lbl">Out of Stock</div></div>
      <div class="stat"><div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div><div class="stat-val">${(userData.bizLocation || "—").split(",")[0]}</div><div class="stat-lbl">Location</div></div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(249,115,22,0.05));border-color:rgba(245,158,11,0.2);">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div style="font-size:3rem;"><i class="fas fa-store"></i></div>
        <div style="flex:1;">
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;">${userData.bizName || "My Shop"}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:3px;"><i class="fas fa-map-marker-alt"></i> ${userData.bizLocation || "On campus"}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${userData.bizDesc || "No description yet."}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="go('profile')"><i class="fas fa-edit"></i> Edit Shop</button>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title"><i class="fas fa-bolt"></i> Quick Actions</div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;">
        ${qCard("fas fa-plus-circle","Add Product","add")}
        ${qCard("fas fa-box","My Products","products")}
        ${qCard("fas fa-store","Browse Shop","shop")}
        ${qCard("fas fa-user-circle","My Profile","profile")}
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title"><i class="fas fa-box"></i> My Products</div><button class="btn btn-outline btn-sm" onclick="go('products')">View All</button></div>
      <div id="myProds"><div class="spinner"></div></div>
    </div>
  `);
  
  if (currentUser && !currentUser.uid.startsWith("guest")) {
    const q = query(collection(db,"products"), where("sellerId","==",currentUser.uid), orderBy("createdAt","desc"));
    onSnapshot(q, snap => {
      const el = document.getElementById("myProds"); if(!el) return;
      if(!snap.docs.length) {
        el.innerHTML = `<div class="empty"><div class="ei"><i class="fas fa-box-open"></i></div><h3>No products yet</h3><p>Add your first product to start selling.</p><br><button class="btn btn-primary" onclick="go('add')"><i class="fas fa-plus"></i> Add Product</button></div>`;
        return;
      }
      el.innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>Photo</th><th>Product</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr></thead><tbody>${snap.docs.slice(0,5).map(d=>prodRow(d.id,d.data())).join("")}</tbody></table></div>`;
    });
  } else {
    document.getElementById("myProds").innerHTML = `<div class="empty"><div class="ei"><i class="fas fa-box-open"></i></div><h3>Login to add products</h3></div>`;
  }
}

function qCard(icon,label,sec) {
  return `<div onclick="go('${sec}')" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;"
    onmouseover="this.style.borderColor='rgba(245,158,11,0.4)';this.style.transform='translateY(-2px)'"
    onmouseout="this.style.borderColor='var(--border)';this.style.transform='none'">
    <i class="${icon}" style="font-size:24px;margin-bottom:8px;display:block;color:#fbbf24;"></i>
    <div style="font-size:12px;font-weight:600;">${label}</div>
  </div>`;
}

// ── MY PRODUCTS TABLE ──
function renderProducts() {
  set(`
    <div class="page-hdr"><h1><i class="fas fa-box"></i> My Products</h1><p>Manage what you sell on campus</p></div>
    <div class="card">
      <div class="card-hdr">
        <input id="pSearch" placeholder="Search products..." style="max-width:260px;" oninput="filterProds()">
        <button class="btn btn-primary" onclick="go('add')"><i class="fas fa-plus"></i> Add Product</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Photo</th><th>Product</th><th>Price</th><th>Category</th><th>Location</th><th>Stock</th><th>Actions</th></tr></thead>
          <tbody id="prodsTbody"><tr><td colspan="7" style="text-align:center;padding:30px;"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  `);
  window._myProds = [];
  if (currentUser && !currentUser.uid.startsWith("guest")) {
    const q = query(collection(db,"products"), where("sellerId","==",currentUser.uid));
    onSnapshot(q, snap => {

window.renderAddEdit = async function(productId) {

    const snap = await getDoc(doc(db,"products",productId));
    if (snap.exists()) { pre = snap.data(); existingPhotos = pre.photos||[]; }
  }
  const editing = !!productId;
  
  set(`
    <div class="page-hdr"><h1><i class="fas ${editing ? 'fa-edit' : 'fa-plus-circle'}"></i> ${editing ? "Edit Product" : "Add Product"}</h1></div>
    <div class="card">
      <div class="form-col">
        <div class="form-row">
          <div class="f-wrap"><label>Product Name *</label><input id="pName" placeholder="e.g. A4 Notebooks" value="${escapeHtml(pre.name||"")}"></div>
          <div class="f-wrap"><label>Category *</label><input id="pCat" placeholder="e.g. Stationery, Food, Tech" value="${escapeHtml(pre.category||"")}"></div>
        </div>
        <div class="form-row">
          <div class="f-wrap"><label>Price (ZMW) *</label><input id="pPrice" type="number" placeholder="e.g. 25" value="${pre.price||""}"></div>
          <div class="f-wrap"><label>Campus Location (Room/Block) *</label><input id="pLoc" placeholder="e.g. Room 14B, Male Hostel" value="${escapeHtml(pre.location||"")}"></div>
        </div>
        <div class="f-wrap"><label>Description</label><textarea id="pDesc" placeholder="Describe your product...">${escapeHtml(pre.description||"")}</textarea></div>
        <div class="f-wrap">
          <label>Stock Status</label>
          <select id="pAvail">
            <option value="true" ${pre.available!==false?"selected":""}>In Stock</option>
            <option value="false" ${pre.available===false?"selected":""}>Out of Stock</option>
          </select>
        </div>
        <div class="f-wrap">
          <label>Product Photos (up to 5)</label>
          <div class="photo-zone" onclick="document.getElementById('pPhotoInput').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size:2rem;margin-bottom:6px;display:block;"></i>
            <div style="font-size:13px;color:var(--muted);">Click to upload photos</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:3px;">JPG or PNG</div>
          </div>
          <input type="file" id="pPhotoInput" accept="image/jpeg,image/png" multiple style="display:none" onchange="handlePhotos(event)">
          <div class="photo-previews" id="photoPreviews">
            ${existingPhotos.map((url,i)=>`
              <div class="photo-thumb-wrap">
                <img src="${url}" class="photo-thumb">
                <button class="photo-remove" onclick="removeExisting(${i})"><i class="fas fa-times"></i></button>
              </div>`).join("")}
          </div>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">${editing ? "<i class='fas fa-save'></i> Save Changes" : "<i class='fas fa-plus'></i> Add Product"}</button>
          <button class="btn btn-outline" onclick="go('products')">Cancel</button>
        </div>
      </div>
    </div>
  `);
  updatePhotoPreviewDisplay();
};

function updatePhotoPreviewDisplay() {
  const previews = document.getElementById("photoPreviews");
  if(!previews) return;
  let html = "";
  existingPhotos.forEach((url,i) => {
    html += `<div class="photo-thumb-wrap"><img src="${url}" class="photo-thumb"><button class="photo-remove" onclick="removeExisting(${i})"><i class="fas fa-times"></i></button></div>`;
  });
  pendingPhotos.forEach((file,i) => {
    const url = URL.createObjectURL(file);
    html += `<div class="photo-thumb-wrap"><img src="${url}" class="photo-thumb"><button class="photo-remove" onclick="removePending(${i})"><i class="fas fa-times"></i></button></div>`;
  });
  previews.innerHTML = html || '<div style="color:var(--muted);font-size:12px;padding:8px;">No photos uploaded yet</div>';
}

window.handlePhotos = function(e) {
  const files = Array.from(e.target.files);
  const total = existingPhotos.length + pendingPhotos.length + files.length;
  if (total > 5) { showToast("Maximum 5 photos allowed."); return; }
  files.forEach(file => { pendingPhotos.push(file); });
  updatePhotoPreviewDisplay();
  e.target.value = "";
};

window.removeExisting = function(i) { existingPhotos.splice(i,1); updatePhotoPreviewDisplay(); };
window.removePending = function(i) { pendingPhotos.splice(i,1); updatePhotoPreviewDisplay(); };

window.saveProduct = async function() {
  const name = document.getElementById("pName")?.value?.trim();
  const cat = document.getElementById("pCat")?.value?.trim();
  const price = parseFloat(document.getElementById("pPrice")?.value) || 0;
  const loc = document.getElementById("pLoc")?.value?.trim();
  const desc = document.getElementById("pDesc")?.value?.trim();
  const avail = document.getElementById("pAvail")?.value === "true";

  if (!name || !price || !loc) { showToast("Name, price and location are required."); return; }
  if (!currentUser || currentUser.uid.startsWith("guest")) { showToast("Login to save products", "error"); return; }

  const btn = document.getElementById("saveBtn"); 
  btn.disabled = true; 
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
  showToast("Uploading...","info");

  let photos = [...existingPhotos];
  for (const file of pendingPhotos) {
    const r = ref(storage, `products/${currentUser.uid}/${Date.now()}_${file.name}`);
    await uploadBytes(r, file); 
    photos.push(await getDownloadURL(r));
  }

  const data = { 
    name, category: cat, price, location: loc, description: desc, available: avail, photos,
    sellerId: currentUser.uid, sellerName: userData.fullName, bizName: userData.bizName || "",
    updatedAt: serverTimestamp() 
  };

  try {
    if (editingId) { 
      await updateDoc(doc(db, "products", editingId), data); 
      showToast("Product updated! ✅", "success"); 
    } else { 
      data.createdAt = serverTimestamp(); 
      await addDoc(collection(db, "products"), data); 
      showToast("Product added! 🎉", "success"); 
    }
    pendingPhotos = []; existingPhotos = []; 
    go("products");
  } catch(err) {
    showToast("Error: " + err.message, "error"); 
    btn.disabled = false; 
    btn.innerHTML = editingId ? "<i class='fas fa-save'></i> Save Changes" : "<i class='fas fa-plus'></i> Add Product";
  }
};

window.editProduct = async function(id) {
  if (!currentUser || currentUser.uid.startsWith("guest")) {
    showToast("Login to edit products", "error");
    return;
  }
  await renderAddEdit(id);
};

window.deleteProduct = async function(id) {
  if (!confirm("Delete this product?")) return;
  await deleteDoc(doc(db,"products",id)); 
  showToast("Product deleted.","info");
};

function set(html) { document.getElementById("mainContent").innerHTML = html; }
function timeAgo(d) { if(!d) return "—"; const s=Math.floor((new Date()-d)/1000); if(s<60) return "just now"; if(s<3600) return `${Math.floor(s/60)}m ago`; if(s<86400) return `${Math.floor(s/3600)}h ago`; return `${Math.floor(s/86400)}d ago`; }
function escapeHtml(str) { if(!str) return ""; return String(str).replace(/[&<>]/g, m => m==="&"?"&amp;":m==="<"?"&lt;":"&gt;"); }
window.showToast = function(msg,type="error"){ const t=document.getElementById("toast"); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.className="toast",3200); };
window.toggleSidebar = function(){ document.getElementById("sidebar").classList.toggle("open"); document.getElementById("sOverlay").classList.toggle("show"); };
window.closeSidebar = function(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("sOverlay").classList.remove("show"); };
window.handleLogout = async function(){ await signOut(auth); window.location.href="login.html"; };
