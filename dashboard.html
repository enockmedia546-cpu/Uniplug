<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIPLUG | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --blue: #2563eb;
  --sky: #0ea5e9;
  --blue-glow: rgba(37,99,235,0.2);
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-focus: #3b82f6;
  --text: #ffffff;
  --muted: #9ca3af;
  --label: #d1d5db;
  --error: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
  --sidebar-w: 260px;
  --radius: 14px;
}

body {
  background: linear-gradient(135deg, #000000, #05070d, #0b1120);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: rgba(5,7,13,0.95);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.3s ease;
  backdrop-filter: blur(20px);
}

.sidebar-logo {
  padding: 24px 20px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 2px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo span { color: var(--sky); }

.sidebar-profile {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}
.sidebar-profile:hover { background: var(--surface); }

.profile-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--sky));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px; font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
}
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.profile-role { font-size: 11px; color: var(--sky); font-weight: 500; margin-top: 2px; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 12px 20px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 20px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  border-left: 3px solid transparent;
  transition: all 0.2s;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active {
  background: rgba(37,99,235,0.1);
  color: var(--text);
  border-left-color: var(--blue);
}
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.nav-role-tag {
  margin-left: auto;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 6px;
  background: rgba(14,165,233,0.15);
  color: var(--sky);
  text-transform: uppercase;
}

.sidebar-bottom {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.sidebar-btn.logout:hover { color: var(--error); border-color: var(--error); }

.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: sticky; top: 0;
  background: rgba(5,7,13,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 50;
}
.topbar-hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 16px; }

.notification-bell {
  position: relative;
  cursor: pointer;
  font-size: 20px;
  color: var(--muted);
  transition: color 0.2s;
}
.notification-bell:hover { color: var(--sky); }
.notification-badge {
  position: absolute;
  top: -8px;
  right: -10px;
  background: var(--error);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
}

.topbar-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--sky));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px; font-weight: 700;
  overflow: hidden;
  cursor: pointer;
}
.topbar-avatar img { width: 100%; height: 100%; object-fit: cover; }

.content { padding: 28px; flex: 1; }

.page-header { margin-bottom: 24px; }
.page-header h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
.page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: rgba(59,130,246,0.3); }
.stat-icon { font-size: 22px; margin-bottom: 10px; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }

.btn {
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--sky));
  color: white;
  box-shadow: 0 4px 16px rgba(37,99,235,0.25);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.35); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-outline:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.role-badge {
  display: inline-block;
  padding: 4px 12px;
  background: rgba(37,99,235,0.15);
  color: var(--sky);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.role-badge-multi {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.role-chip {
  display: inline-block;
  padding: 3px 10px;
  background: rgba(14,165,233,0.12);
  border: 1px solid rgba(14,165,233,0.2);
  color: var(--sky);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #0b1120;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 50%; width: 30px; height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer; color: var(--muted);
}
.modal-close:hover { color: var(--text); }
.modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

.form-col { display: flex; flex-direction: column; gap: 14px; }
.f-wrap { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 13px; color: var(--label); font-weight: 500; }
input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--border-focus);
}

.notification-panel {
  position: absolute;
  top: 60px;
  right: 20px;
  width: 320px;
  max-height: 400px;
  background: #0f172a;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow-y: auto;
  z-index: 150;
  display: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
.notification-panel.show { display: block; }
.notification-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}
.notification-item:hover { background: rgba(255,255,255,0.03); }
.notification-item.unread { background: rgba(37,99,235,0.08); }
.notification-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.notification-message { font-size: 12px; color: var(--muted); }
.notification-time { font-size: 10px; color: var(--muted); margin-top: 6px; }
.notification-empty {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 13px;
}

.feed-item {
  display: flex;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.feed-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--sky));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.feed-body { flex: 1; }
.feed-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.feed-meta strong { color: var(--label); }
.feed-text { font-size: 14px; line-height: 1.5; }
.feed-time { font-size: 11px; color: var(--muted); margin-top: 6px; }

.listing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.listing-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.2s;
}
.listing-card:hover { transform: translateY(-3px); border-color: rgba(59,130,246,0.3); }
.listing-img {
  width: 100%; height: 160px;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
}
.listing-img img { width: 100%; height: 100%; object-fit: cover; }
.listing-body { padding: 16px; }
.listing-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
.listing-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.listing-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.listing-price { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--sky); }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue { background: rgba(37,99,235,0.15); color: #60a5fa; }
.badge-green { background: rgba(16,185,129,0.15); color: #34d399; }
.badge-red { background: rgba(239,68,68,0.15); color: #f87171; }

.chat-wrap { display: flex; flex-direction: column; height: 420px; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  margin-bottom: 12px;
}
.chat-msg { display: flex; gap: 10px; align-items: flex-start; }
.chat-msg.own { flex-direction: row-reverse; }
.chat-bubble {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13px;
}
.chat-msg:not(.own) .chat-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}
.chat-msg.own .chat-bubble {
  background: rgba(37,99,235,0.25);
  border: 1px solid rgba(37,99,235,0.3);
  border-top-right-radius: 4px;
}
.chat-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.chat-time { font-size: 10px; color: var(--muted); margin-top: 4px; }
.chat-input-row { display: flex; gap: 10px; }
.chat-input-row input { flex: 1; }

.profile-hero {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 28px;
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.profile-big-avatar {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--sky));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px; font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.profile-big-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-big-avatar .avatar-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.profile-big-avatar:hover .avatar-overlay { display: flex; }
.profile-details h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
.profile-details .profile-meta {
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; color: var(--label); margin-bottom: 6px; }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #dc2626; color: white; }
.toast.success { background: var(--success); color: white; }
.toast.info { background: #1d4ed8; color: white; }

.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .main { margin-left: 0; }
  .topbar-hamburger { display: block; }
  .content { padding: 16px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .profile-hero { flex-direction: column; text-align: center; }
  .notification-panel { width: 90%; right: 5%; left: 5%; }
}
</style>
</head>

<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">UNI<span>PLUG</span></div>
  <div class="sidebar-profile" onclick="showSection('profile')">
    <div class="profile-avatar" id="sidebarAvatar">U</div>
    <div class="profile-info">
      <div class="profile-name" id="sidebarName">Loading...</div>
      <div class="profile-role" id="sidebarRole">—</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-bottom">
    <button class="sidebar-btn" onclick="window.location.href='site.html'"><i class="fas fa-globe"></i> View Site</button>
    <button class="sidebar-btn logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="topbar-hamburger" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title" id="topbarTitle">Dashboard</div>
    <div class="topbar-right">
      <div class="notification-bell" onclick="toggleNotifications()">
        <i class="fas fa-bell"></i>
        <span class="notification-badge" id="notificationBadge" style="display:none;">0</span>
      </div>
      <div class="topbar-avatar" id="topbarAvatar" onclick="showSection('profile')">U</div>
    </div>
  </div>
  <div class="content" id="mainContent"><div class="spinner"></div></div>
</div>

<div class="notification-panel" id="notificationPanel">
  <div class="notification-empty">Loading notifications...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, updateDoc, addDoc,
  collection, query, where, orderBy, onSnapshot, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyAxwUZXw4YuOh6X29G9utuld-JtOTEhf0g",
  authDomain: "unplugin-f9afc.firebaseapp.com",
  projectId: "unplugin-f9afc",
  storageBucket: "unplugin-f9afc.appspot.com"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let userData = null;
let activeSection = "home";
let chatUnsub = null;
let notificationsUnsub = null;
let unreadCount = 0;

// Auth Guard
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "login.html"; return; }
  currentUser = user;
  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists()) { window.location.href = "login.html"; return; }
  userData = snap.data();
  
  if (!userData.additionalRoles) {
    await updateDoc(doc(db, "users", user.uid), { additionalRoles: [] });
    userData.additionalRoles = [];
  }
  
  initDashboard();
});

function initDashboard() {
  renderSidebarProfile();
  renderSidebarNav();
  loadNotifications();
  showSection("home");
}

function renderSidebarProfile() {
  const initials = (userData.fullName || "U").split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("sidebarAvatar").innerHTML = userData.photoURL ? `<img src="${userData.photoURL}">` : initials;
  document.getElementById("topbarAvatar").innerHTML = userData.photoURL ? `<img src="${userData.photoURL}">` : initials;
  document.getElementById("sidebarName").textContent = userData.fullName || "Student";
  document.getElementById("sidebarRole").textContent = userData.role || "Student";
}

// ROLE-BASED SIDEBAR NAVIGATION - FIXED FOR ADMIN
function renderSidebarNav() {
  const primaryRole = userData.role;
  const additionalRoles = userData.additionalRoles || [];
  const allRoles = [primaryRole, ...additionalRoles];
  
  // Common sections for ALL users
  let html = `<div class="nav-section-label"><i class="fas fa-th-large"></i> Main</div>`;
  
  // Home - always visible
  html += `<div class="nav-item" id="nav-home" onclick="showSection('home')">
    <i class="fas fa-home nav-icon"></i>
    <span>Home</span>
  </div>`;
  
  // Boarding Houses - always visible

// Load notifications from broadcasts only
function loadNotifications() {
  if (notificationsUnsub) notificationsUnsub();
  
  const q = query(collection(db, "broadcasts"), orderBy("createdAt", "desc"), limit(50));
  notificationsUnsub = onSnapshot(q, async (snap) => {
    const readNotifications = JSON.parse(localStorage.getItem(`read_notifs_${currentUser.uid}`) || "[]");
    
    const notifications = [];
    snap.forEach(doc => {
      const data = doc.data();
      notifications.push({
        id: doc.id,
        title: data.title || "Broadcast",
        message: data.message || "",
        time: data.createdAt?.toDate() || new Date(),
        read: readNotifications.includes(doc.id)
      });
    });
    
    unreadCount = notifications.filter(n => !n.read).length;
    const badge = document.getElementById("notificationBadge");
    if (unreadCount > 0) {
      badge.textContent = unreadCount > 99 ? "99+" : unreadCount;
      badge.style.display = "block";
    } else {
      badge.style.display = "none";
    }
    
    renderNotificationPanel(notifications);
  });
}

function renderNotificationPanel(notifications) {
  const panel = document.getElementById("notificationPanel");
  if (notifications.length === 0) {
    panel.innerHTML = `<div class="notification-empty"><i class="fas fa-bell-slash"></i> No notifications</div>`;
    return;
  }
  panel.innerHTML = notifications.map(n => `
    <div class="notification-item ${!n.read ? 'unread' : ''}" onclick="markNotificationRead('${n.id}')">
      <div class="notification-title"><i class="fas fa-bullhorn"></i> ${escapeHtml(n.title)}</div>
      <div class="notification-message">${escapeHtml(n.message.substring(0, 80))}${n.message.length > 80 ? '...' : ''}</div>
      <div class="notification-time">${timeAgo(n.time)}</div>
    </div>
  `).join("");
}

window.toggleNotifications = function() {
  const panel = document.getElementById("notificationPanel");
  panel.classList.toggle("show");
};

window.markNotificationRead = function(notificationId) {
  const readNotifications = JSON.parse(localStorage.getItem(`read_notifs_${currentUser.uid}`) || "[]");
  if (!readNotifications.includes(notificationId)) {
    readNotifications.push(notificationId);
    localStorage.setItem(`read_notifs_${currentUser.uid}`, JSON.stringify(readNotifications));
  }
  loadNotifications();
};

window.openRequestRoleModal = function() {
  const currentRoles = [userData.role, ...(userData.additionalRoles || [])];
  const availableRoles = ["Landlord", "Entrepreneur", "Class Representative", "Student Leader"].filter(r => !currentRoles.includes(r));

window.submitRoleRequest = async function() {
  const requestedRole = document.getElementById("requestedRole")?.value;
  const reason = document.getElementById("requestReason")?.value;
  
  if (!requestedRole) { showToast("Please select a role"); return; }
  
  await addDoc(collection(db, "roleRequests"), {
    userId: currentUser.uid,
    userName: userData.fullName,
    userEmail: userData.email,
    requestedRole: requestedRole,
    reason: reason,
    status: "pending",
    createdAt: serverTimestamp()
  });
  
  closeModal();
  showToast(`Request for ${requestedRole} submitted! Admin will review.`, "success");
};

window.filterListings = function() {
  const search = (document.getElementById("boardSearch")?.value || "").toLowerCase();
  const filter = document.getElementById("boardFilter")?.value || "";
  let list = window._allListings || [];
  if (search) list = list.filter(l => (l.brandName + l.area).toLowerCase().includes(search));
  if (filter === "low") list = list.filter(l => l.price < 1000);
  else if (filter === "mid") list = list.filter(l => l.price >= 1000 && l.price <= 2000);
  else if (filter === "high") list = list.filter(l => l.price > 2000);
  const grid = document.getElementById("boardingGrid");
  if (!grid) return;
  if (!list.length) { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-building" style="font-size:3rem;margin-bottom:12px;display:block;"></i><h3>No listings found</h3></div>`; return; }
  grid.innerHTML = list.map(l => `<div class="listing-card"><div class="listing-img">${l.photos?.[0] ? `<img src="${l.photos[0]}">` : "<i class='fas fa-home' style='font-size:48px;opacity:0.5;'></i>"}</div>

    const el = document.getElementById("chatMessages");
    if (!el) return;
    el.innerHTML = snap.docs.length ? snap.docs.map(d => { const m = d.data(); const own = m.uid === currentUser.uid; return `<div class="chat-msg ${own ? 'own' : ''}">${!own ? `<div class="feed-avatar" style="width:30px;height:30px;font-size:11px;">${(m.name||"?").slice(0,2).toUpperCase()}</div>` : ""}<div>${!own ? `<div class="chat-name">${escapeHtml(m.name)}</div>` : ""}<div class="chat-bubble">${escapeHtml(m.text)}</div><div class="chat-time">${timeAgo(m.createdAt?.toDate())}</div></div></div>`; }).join("") : `<div style="text-align:center;padding:20px;color:var(--muted);"><i class="fas fa-comment-dots"></i> No messages yet</div>`;
    el.scrollTop = el.scrollHeight;
  });
}

window.sendChatMsg = async function() {
  const input = document.getElementById("chatInput");
  const text = input?.value?.trim();
  if (!text || !userData.classGroupId) return;
  input.value = "";
  await addDoc(collection(db, "chats", userData.classGroupId, "messages"), { text, uid: currentUser.uid, name: userData.fullName, role: userData.role, createdAt: serverTimestamp() });
};

// PROFILE
function renderProfile() {
  const u = userData;
  const initials = (u.fullName || "U").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const additionalRoles = u.additionalRoles || [];
  document.getElementById("mainContent").innerHTML = `<div class="page-header"><h1><i class="fas fa-user-circle"></i> My Profile</h1></div>
    <div class="profile-hero"><div class="profile-big-avatar" onclick="document.getElementById('avatarInput').click()">${u.photoURL ? `<img src="${u.photoURL}">` : `<span>${initials}</span>`}<div class="avatar-overlay"><i class="fas fa-camera"></i></div></div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
    <div class="profile-details"><h2>${escapeHtml(u.fullName || "Student")}</h2>
    <div class="role-badge-multi">${[u.role, ...additionalRoles].map(r => `<span class="role-chip"><i class="fas fa-check-circle"></i> ${r}</span>`).join("")}</div>
    <div class="profile-meta">${u.email ? `<span><i class="fas fa-envelope"></i> ${u.email}</span>` : ""}${u.phone ? `<span><i class="fas fa-phone"></i> ${u.phone}</span>` : ""}${u.school ? `<span><i class="fas fa-university"></i> ${u.school}</span>` : ""}${u.program ? `<span><i class="fas fa-book"></i> ${u.program}</span>` : ""}${u.year ? `<span><i class="fas fa-calendar-alt"></i> Year ${u.year}</span>` : ""}</div></div></div>
    <div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-edit"></i> Edit Profile</div></div>
    <div class="form-col"><div class="form-row"><div class="field-wrap"><label>First Name</label><input id="editFirst" value="${u.firstName || ""}"></div>
    <div class="field-wrap"><label>Last Name</label><input id="editLast" value="${u.lastName || ""}"></div></div>
    <div class="field-wrap"><label>Phone</label><input id="editPhone" value="${u.phone || ""}"></div>
    <button class="btn btn-primary" onclick="saveProfileChanges()"><i class="fas fa-save"></i> Save Changes</button></div></div>`;
}

window.saveProfileChanges = async function() {
  const updates = { firstName: document.getElementById("editFirst")?.value?.trim(), lastName: document.getElementById("editLast")?.value?.trim(), phone: document.getElementById("editPhone")?.value?.trim() };
  updates.fullName = `${updates.firstName} ${updates.lastName}`;
  await updateDoc(doc(db, "users", currentUser.uid), updates);
  Object.assign(userData, updates);
  renderSidebarProfile();
  showToast("Profile updated!", "success");
  renderProfile();
};

window.uploadAvatar = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  showToast("Uploading...", "info");
  const storageRef = ref(storage, `profiles/${currentUser.uid}`);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);
  await updateDoc(doc(db, "users", currentUser.uid), { photoURL: url });
  userData.photoURL = url;
  renderSidebarProfile();
  renderProfile();
  showToast("Photo updated!", "success");
};

// HELPERS
function timeAgo(date) { if (!date) return "—"; const s = Math.floor((new Date() - date) / 1000); if (s < 60) return "just now"; if (s < 3600) return `${Math.floor(s/60)}m ago`; if (s < 86400) return `${Math.floor(s/3600)}h ago`; return `${Math.floor(s/86400)}d ago`; }
function escapeHtml(str) { if (!str) return ""; return String(str).replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"); }
function getGreeting() { const h = new Date().getHours(); if (h < 12) return "Good morning"; if (h < 17) return "Good afternoon"; return "Good evening"; }

window.showToast = function(msg, type = "success") { const t = document.getElementById("toast"); t.textContent = msg; t.className = `toast show ${type}`; setTimeout(() => t.className = "toast", 3000); };
window.openModal = function(html) { document.getElementById("modalContent").innerHTML = html; document.getElementById("modalOverlay").classList.add("show"); };
window.closeModal = function() { document.getElementById("modalOverlay").classList.remove("show"); };
window.toggleSidebar = function() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("sidebarOverlay").classList.toggle("show"); };
window.closeSidebar = function() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("sidebarOverlay").classList.remove("show"); };
window.handleLogout = async function() { await signOut(auth); localStorage.clear(); window.location.href = "login.html"; };
</script>
</body>
</html>
