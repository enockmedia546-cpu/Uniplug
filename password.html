<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIPLUG | Forgot Password</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 25%),
    radial-gradient(circle at bottom left, rgba(14, 165, 233, 0.08), transparent 30%),
    linear-gradient(135deg, #000000, #05070d, #0b1120);
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 16px;
}

.container {
  width: 100%;
  max-width: 450px;
}

.card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border-radius: 32px;
  padding: 40px 32px;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.logo-area {
  text-align: center;
  margin-bottom: 32px;
}

.logo-title {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #60a5fa, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h2 {
  font-size: 24px;
  margin-bottom: 8px;
}

.subtitle {
  color: #9ca3af;
  font-size: 14px;
  margin-bottom: 24px;
  text-align: center;
}

input {
  width: 100%;
  padding: 15px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.04);
  color: #ffffff;
  font-size: 15px;
  margin-bottom: 20px;
  transition: border 0.3s;
}

input:focus {
  outline: none;
  border-color: #3b82f6;
}

.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #2563eb, #0ea5e9);
  color: white;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.back-link {
  text-align: center;
  margin-top: 24px;
}

.back-link a {
  color: #60a5fa;
  text-decoration: none;
  font-size: 14px;
}

.message {
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 20px;
  font-size: 14px;
  display: none;
}

.message.success {
  background: rgba(16, 185, 129, 0.2);
  color: #6ee7b7;
  border: 1px solid rgba(16, 185, 129, 0.3);
}

.message.error {
  background: rgba(239, 68, 68, 0.2);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

.info-text {
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="logo-area">
      <div class="logo-title">UNIPLUG</div>
    </div>

    <h2 style="text-align: center;">Reset Password</h2>
    <div class="subtitle">Enter your email to receive a reset link</div>

    <div id="messageBox" class="message"></div>

    <input type="email" id="resetEmail" placeholder="Your email address">

    <button class="btn" id="resetBtn">Send Reset Link</button>

    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>

    <div class="info-text">
      We'll send you a link to reset your password. The link expires in 1 hour.
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxwUZXw4YuOh6X29G9utuld-JtOTEhf0g",
  authDomain: "unplugin-f9afc.firebaseapp.com",
  projectId: "unplugin-f9afc",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const resetBtn = document.getElementById("resetBtn");
const emailInput = document.getElementById("resetEmail");
const messageBox = document.getElementById("messageBox");

function showMessage(message, type = "error") {
  messageBox.textContent = message;
  messageBox.className = `message ${type}`;
  messageBox.style.display = "block";
}

function hideMessage() {
  messageBox.style.display = "none";
}

resetBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();

  if (!email) {
    showMessage("Please enter your email address");
    return;
  }

  if (!email.includes("@") || !email.includes(".")) {
    showMessage("Please enter a valid email address");
    return;
  }

  hideMessage();
  resetBtn.disabled = true;
  resetBtn.textContent = "Sending...";

  try {
    await sendPasswordResetEmail(auth, email);
    showMessage(
      "✅ Reset link sent! Check your email (including spam folder).",
      "success"
    );
    emailInput.value = "";

    // Optional: Auto-redirect after 5 seconds
    setTimeout(() => {
      window.location.href = "login.html";
    }, 5000);

  } catch (error) {
    let errorMsg = "Something went wrong. Please try again.";

    switch (error.code) {
      case "auth/user-not-found":
        errorMsg = "No account found with this email address.";
        break;
      case "auth/invalid-email":
        errorMsg = "Please enter a valid email address.";
        break;
      case "auth/too-many-requests":
        errorMsg = "Too many requests. Please try again later.";
        break;
    }

    showMessage(errorMsg);
    resetBtn.disabled = false;
    resetBtn.textContent = "Send Reset Link";
  }
});

// Allow Enter key to submit
emailInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    resetBtn.click();
  }
});
</script>

</body>
</html>
